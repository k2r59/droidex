<!--
  Planète de la carte « prochaine renaissance ».

  Composition de substitution, en SVG plutôt qu'en image bitmap : elle reste nette à
  toute taille et pèse 2 Ko. À remplacer par l'illustration définitive dès qu'elle est
  disponible — voir le README du dossier.

  L'anneau passe derrière puis devant la sphère : c'est ce recouvrement qui donne la
  profondeur, un simple ovale traversant la planète paraîtrait plat.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none">
  <defs>
    <radialGradient id="fond" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0d2a55"/>
      <stop offset="55%" stop-color="#071634"/>
      <stop offset="100%" stop-color="#03091c"/>
    </radialGradient>

    <!-- Éclairage venant du haut-droite, comme la comète. -->
    <radialGradient id="sphere" cx="68%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#cfe9ff"/>
      <stop offset="28%" stop-color="#5aa8e8"/>
      <stop offset="62%" stop-color="#1f4f8f"/>
      <stop offset="100%" stop-color="#050f24"/>
    </radialGradient>

    <linearGradient id="anneau" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25d7ff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#25d7ff" stop-opacity=".75"/>
      <stop offset="60%" stop-color="#7db8ff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#25d7ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="comete" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d7ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#eaf9ff" stop-opacity=".95"/>
    </linearGradient>

    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="halo-fin" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="320" height="360" fill="url(#fond)"/>

  <!-- Champ d'étoiles, positions fixes pour un rendu stable. -->
  <g fill="#dbeafe">
    <circle cx="34" cy="52" r="1.6" opacity=".9"/>
    <circle cx="268" cy="38" r="1.3" opacity=".8"/>
    <circle cx="292" cy="132" r="1.7" opacity=".85"/>
    <circle cx="58" cy="212" r="1.2" opacity=".6"/>
    <circle cx="22" cy="300" r="1.5" opacity=".7"/>
    <circle cx="248" cy="292" r="1.4" opacity=".75"/>
    <circle cx="150" cy="26" r="1.1" opacity=".55"/>
    <circle cx="300" cy="238" r="1.2" opacity=".65"/>
    <circle cx="86" cy="120" r="1" opacity=".5"/>
    <circle cx="196" cy="330" r="1.3" opacity=".6"/>
  </g>

  <!-- Halo diffus autour de la planète. -->
  <circle cx="160" cy="184" r="84" fill="#1d6fd0" opacity=".38" filter="url(#halo)"/>

  <!-- Anneau, moitié arrière. -->
  <g transform="rotate(-19 160 184)">
    <ellipse cx="160" cy="184" rx="138" ry="34" stroke="url(#anneau)" stroke-width="7" opacity=".85"/>
    <ellipse cx="160" cy="184" rx="120" ry="27" stroke="url(#anneau)" stroke-width="3" opacity=".5"/>
  </g>

  <circle cx="160" cy="184" r="72" fill="url(#sphere)"/>

  <!-- Bandes nuageuses, découpées à la sphère. -->
  <g clip-path="circle(72px at 160px 184px)" opacity=".5">
    <path d="M88 152c40 12 92 6 144-8" stroke="#eaf6ff" stroke-width="7" opacity=".45" fill="none"/>
    <path d="M92 188c46 14 104 4 148-14" stroke="#cbe6ff" stroke-width="5" opacity=".35" fill="none"/>
    <path d="M104 216c40 10 84 2 124-12" stroke="#a9d4ff" stroke-width="4" opacity=".28" fill="none"/>
  </g>

  <!-- Terminateur : le bord non éclairé, côté opposé à la comète. -->
  <circle cx="160" cy="184" r="72" fill="url(#sphere)" opacity="0"/>
  <path d="M160 112a72 72 0 0 0 0 144 72 72 0 0 1 0-144Z" fill="#040c1e" opacity=".45"/>

  <!-- Anneau, moitié avant : passe devant la sphère et crée la profondeur. -->
  <g transform="rotate(-19 160 184)">
    <path d="M22 184a138 34 0 0 0 276 0" stroke="url(#anneau)" stroke-width="7" fill="none" opacity=".95"/>
    <path d="M40 184a120 27 0 0 0 240 0" stroke="url(#anneau)" stroke-width="3" fill="none" opacity=".55"/>
  </g>

  <!-- Comète : traînée fine puis tête lumineuse. -->
  <path d="M18 74 130 150" stroke="url(#comete)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="132" cy="152" r="6" fill="#eaf9ff" filter="url(#halo-fin)"/>
  <circle cx="132" cy="152" r="2.6" fill="#fff"/>
</svg>
